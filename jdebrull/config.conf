server {
	listen 0.0.0.0:8080;
	server_name mysite.local;

	root /var/www/html;
	index index.html;

	client_max_body_size 1048576;
	error_page 403 404 500 /errors/50x.html;

	location / {
		allowed_methods GET POST;
		autoindex off;
	}

	location /upload {
		allowed_methods POST;
		root /var/www/uploads;
	}
}