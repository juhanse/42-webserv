server {
    listen 127.0.0.1:8080;

    server_name localhost;

    root /var/www/html;
    index index.html index.htm;

    client_max_body_size 52428800;
    error_page 404 /errors/404.html;
    error_page 500 /errors/50x.html;

    location / {
        root /var/www/html;
        index index.html;
        autoindex off;
        methods GET POST;
        client_max_size 50;
    }

    location /images/ {
        root /var/www/assets;
        autoindex on;
    }

    location /upload/ {
        root /var/www/uploads;
        upload /uploads;
    }

    location /redirect/ {
        return 100 /;
        methods GET DELETE;
    }

    location /nested/ {
        root /var/www/deep;
    }

    location /cgi-bin/ {
        root /var/www/cgi;
        cgi_extension .php /usr/www/var;
        methods GET POST;
    }
}

server {
    listen 127.0.0.1:8080;
}
