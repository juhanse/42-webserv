server {
    listen 127.0.0.1:8080;

    server_name localhost;

    root ./www/html;
    index index.html index.htm;

    client_max_body_size 100000;

    error_page 404 405 406 407 408 ./www/errors/404.html;
    error_page 403 ./www/errors/403.html;
    error_page 500 ./www/errors/500.html;

    location / {
        allow_methods GET POST DELETE;
        autoindex off;
    }

    location /upload {
        allow_methods POST;
        root ./www/uploads;
        autoindex on;
    }

    location /cgi-bin {
        allow_methods GET POST;
        root ./www/cgi-bin;
        cgi_extension .py /usr/bin/python3;
    }

    location /images {
        allow_methods GET;
        root ./www/images;
        autoindex on;
    }

    location /old-page {
        return 301 http://localhost:8080/new-page;
    }
}

server {
    listen 127.0.0.1:9090;

    server_name testserver;

    root ./www/test;
    index index.html;

    client_max_body_size 500000;

    error_page 404 ./www/errors/404.html;

    location / {
        allow_methods GET;
        autoindex on;
    }

    location /delete {
        allow_methods DELETE;
        root ./www/delete;
    }
}


server {
        listen 8080;
        server_name localhost;

        root /var/www/html;
        index index.html index.htm;

        client_max_body_size 10M;

        error_page 404 /errors/404.html;
        error_page 500 502 503 504 /errors/50x.html;

        location / {
            allowed_methods GET POST DELETE;
            autoindex off;
        }

        location /upload {
            allowed_methods POST;
            upload_store /var/www/uploads;
        }

        location /images {
            root /var/www/assets;
            autoindex on;
        }

        location /cgi-bin {
            allowed_methods GET POST;
            cgi_pass /usr/bin/php-cgi;
            cgi_extension .php;
        }

        location /redirect {
            return 301 http://example.com;
        }
    }

    # Second server (virtual host)
    server {
        listen 9090;
        server_name test.local;

        root /var/www/testsite;
        index index.html;

        client_max_body_size 5M;

        location / {
            allowed_methods GET;
        }

        location /delete {
            allowed_methods DELETE;
        }

        error_page 404 /404.html;
    }

    # Third server with multiple ports
    server {
        listen 8000;
        listen 8001;

        server_name multisite.local;

        root /var/www/multi;
        index index.html index.php;

        location / {
            allowed_methods GET POST;
        }

        location /api {
            allowed_methods GET POST DELETE;
            autoindex off;
        }
    }