<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<title>Test POST Webserv</title>
		<style>
			body { font-family: Arial, sans-serif; padding: 50px; background-color: #f4f4f9; }
			.container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; margin-bottom: 30px; }
			input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
			button { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; }
			button:hover { background: #218838; }
			.upload-btn { background: #007bff; }
			.upload-btn:hover { background: #0056b3; }
		</style>
	</head>

	<body>
		<div class="container">
			<h2>1. Connexion</h2>
			<form action="/traitement" method="POST">
				<label for="nom">Ton Nom :</label>
				<input type="text" id="nom" name="utilisateur" required>

				<label for="msg">Ton Message :</label>
				<textarea id="msg" name="message" rows="4" required></textarea>

				<button type="submit">Se connecter</button>
			</form>
		</div>

		<div class="container">
			<h2>2. Upload fichier (Securise)</h2>
			<form action="/uploads/" method="POST" enctype="multipart/form-data">
				<label for="fichier">Choisis un fichier :</label>
				<input type="file" id="fichier" name="monFichier" required>

				<button type="submit" class="upload-btn">Uploader le fichier</button>
			</form>
		</div>
	</body>
</html>
