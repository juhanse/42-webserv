<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test POST Webserv</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Envoyer un message (POST)</h2>
        <form action="/traitement" method="POST">
            <label for="nom">Ton Nom :</label>
            <input type="text" id="nom" name="utilisateur" required>

            <label for="msg">Ton Message :</label>
            <textarea id="msg" name="message" rows="4" required></textarea>

            <button type="submit">Envoyer au serveur</button>
        </form>
    </div>
</body>
</html>
