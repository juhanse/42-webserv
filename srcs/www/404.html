<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Non Trouvée</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #ff4d4d; text-align: center; padding-top: 100px; }
        h1 { font-size: 50px; margin-bottom: 10px; }
        p { color: #ccc; }
        .glitch { border: 1px solid #ff4d4d; display: inline-block; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>404</h1>
    <div class="glitch">
        ERREUR : RESSOURCE INTROUVABLE
    </div>
    <p>Le serveur Webserv n'a pas pu localiser le fichier demandé.</p>
    <p><a href="/" style="color: #007bff;">Retourner à l'accueil</a></p>
</body>
</html>
